services:
  mongodb:
    container_name: ${CONTAINER_NAME}
    image: registry.cn-hangzhou.aliyuncs.com/fastgpt/mongo:5.0.32
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${PANEL_DB_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${PANEL_DB_ROOT_PASSWORD}
    networks:
      - 1panel-network
    ports:
      - ${PANEL_APP_PORT_HTTP}:27017
    volumes:
      - ./data:/data/db
    entrypoint:
      - bash
      - -c
      - |
        # 1. 自动处理副本集 keyFile
        if [ ! -f /data/db/mongodb.key ]; then
          openssl rand -base64 128 > /data/db/mongodb.key
          chmod 400 /data/db/mongodb.key
          chown 999:999 /data/db/mongodb.key
        fi

        # 2. 准备初始化 JS
        echo "const isInited = rs.status().ok === 1
        if(!isInited){
          rs.initiate({
              _id: 'rs0',
              members: [
                  { _id: 0, host: '${CONTAINER_NAME}:27017' }
              ]
          })
        }" > /data/db/initReplicaSet.js

        # 3. 后台启动 MongoDB
        exec docker-entrypoint.sh mongod --keyFile /data/db/mongodb.key --replSet rs0 --bind_ip_all &

        # 4. 自动初始化
        until mongo -u ${PANEL_DB_ROOT_USER} -p ${PANEL_DB_ROOT_PASSWORD} --authenticationDatabase admin --eval "print('waited')"; do
          sleep 2
        done

        mongo -u ${PANEL_DB_ROOT_USER} -p ${PANEL_DB_ROOT_PASSWORD} --authenticationDatabase admin /data/db/initReplicaSet.js
        wait $!
    labels:
      createdBy: "Apps"

networks:
  1panel-network:
    external: true
