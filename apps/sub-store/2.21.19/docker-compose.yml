version: "3"
services:
  sub-store:
    image: xream/sub-store:latest
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - ${PANEL_APP_PORT_HTTP}:3001
    volumes:
      - ./data:/opt/sub-store/data
    environment:
      - SUB_STORE_FRONTEND_BACKEND_PATH=/${SUB_STORE_FRONTEND_BACKEND_PATH}
    labels:
      createdBy: "Apps"

networks:
  1panel-network:
    external: true
